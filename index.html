<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 资讯观察</title>
    <script>
      (() => {
        const syncRouteMode = () => document.documentElement.classList.toggle(
          "direct-detail",
          /^#(?:topic|issue|card|research|article|news)\/.+/.test(location.hash),
        );
        syncRouteMode();
        addEventListener("hashchange", syncRouteMode);
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260716-fast-detail-2" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <p class="eyebrow">AI SIGNALS</p>
            <h1>AI 资讯观察</h1>
          </div>
        </div>
        <nav class="nav">
          <a href="#news">新闻资讯</a>
          <a href="#research">深度研究</a>
          <a href="#topics">专题观察</a>
          <a href="#issues">分析卡片</a>
          <a href="#cards">综合研判</a>
          <a href="#articles">文章解读</a>
          <a href="#timeline">更新记录</a>
          <a href="#home">首页</a>
        </nav>
        <section>
          <p class="eyebrow">关注专题</p>
          <div id="topic-nav" class="topic-nav"></div>
        </section>
      </aside>
      <main class="main">
        <header class="hero">
          <div>
            <p class="eyebrow">公开信息 · 资讯追踪 · 趋势分析</p>
            <h2>AI 资讯观察</h2>
            <p class="hero-copy">
              汇集公开来源的 AI 新闻、行业动态与专题分析，帮助快速了解近期变化和重要趋势。
            </p>
          </div>
          <div class="search-wrap">
            <label for="search-input">全站搜索</label>
            <input
              id="search-input"
              type="search"
              disabled
              placeholder="搜索新闻、研究、专题或观点"
            />
            <div id="search-results" class="search-results"></div>
          </div>
        </header>
        <section id="stats" class="stats"></section>
        <section id="content" class="content-panel"></section>
      </main>
    </div>
    <script>
      (() => {
        const match = location.hash.match(/^#(topic|issue|card|research|article|news)\/(.+)$/);
        if (!match) return;
        const type = match[1];
        const id = decodeURIComponent(match[2]);
        const content = document.getElementById("content");
        const labels = {
          topic: "专题观察", issue: "分析卡片", card: "综合研判",
          research: "深度研究", article: "文章解读", news: "新闻资讯",
        };

        const loading = document.createElement("section");
        loading.className = "detail detail-loading";
        const loadingLabel = document.createElement("p");
        loadingLabel.className = "eyebrow";
        loadingLabel.textContent = labels[type];
        const loadingText = document.createElement("p");
        loadingText.className = "loading-copy";
        loadingText.textContent = "正在加载标题与摘要…";
        loading.append(loadingLabel, loadingText);
        content.replaceChildren(loading);

        const renderBootstrapDetail = (fastDetail) => {
          const item = fastDetail.item;
          const section = document.createElement("section");
          section.className = "detail detail-header bootstrap-detail";
          const heading = document.createElement("div");
          heading.className = "detail-title";
          const headingBody = document.createElement("div");
          const label = document.createElement("p");
          label.className = "eyebrow";
          label.textContent = labels[type];
          const title = document.createElement("h3");
          title.textContent = item.title || "未命名内容";
          headingBody.append(label, title);
          heading.append(headingBody);
          section.append(heading);
          if (item.summary) {
            const summary = document.createElement("div");
            summary.className = "summary";
            const strong = document.createElement("strong");
            strong.textContent = "内容摘要";
            const paragraph = document.createElement("p");
            paragraph.textContent = item.summary;
            summary.append(strong, paragraph);
            section.append(summary);
          }
          content.replaceChildren(section);
        };

        window.__fastDetailPromise = fetch(
          `./data/details/${type}/${encodeURIComponent(id)}.json`,
          { cache: "no-store" },
        )
          .then((response) => response.ok ? response.json() : null)
          .then((payload) => {
            if (!payload || payload.type !== type || payload.id !== id || !payload.item) return null;
            const fastDetail = { type, id, item: payload.item };
            renderBootstrapDetail(fastDetail);
            return fastDetail;
          })
          .catch(() => null);
      })();
    </script>
    <script type="module" src="./app.js?v=20260716-fast-detail-2"></script>
  </body>
</html>
