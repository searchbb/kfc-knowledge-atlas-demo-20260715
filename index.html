<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 资讯观察</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <p class="eyebrow">AI SIGNALS</p>
            <h1>AI 资讯观察</h1>
          </div>
        </div>
        <nav class="nav">
          <a href="#news">新闻资讯</a>
          <a href="#research">深度研究</a>
          <a href="#topics">专题观察</a>
          <a href="#issues">分析卡片</a>
          <a href="#cards">综合研判</a>
          <a href="#articles">文章解读</a>
          <a href="#timeline">更新记录</a>
          <a href="#home">首页</a>
        </nav>
        <section>
          <p class="eyebrow">关注专题</p>
          <div id="topic-nav" class="topic-nav"></div>
        </section>
      </aside>
      <main class="main">
        <header class="hero">
          <div>
            <p class="eyebrow">公开信息 · 资讯追踪 · 趋势分析</p>
            <h2>AI 资讯观察</h2>
            <p class="hero-copy">
              汇集公开来源的 AI 新闻、行业动态与专题分析，帮助快速了解近期变化和重要趋势。
            </p>
          </div>
          <div class="search-wrap">
            <label for="search-input">全站搜索</label>
            <input
              id="search-input"
              type="search"
              disabled
              placeholder="搜索新闻、研究、专题或观点"
            />
            <div id="search-results" class="search-results"></div>
          </div>
        </header>
        <section id="stats" class="stats"></section>
        <section id="content" class="content-panel"></section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
