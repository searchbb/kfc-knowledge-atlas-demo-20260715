name = "kfc-research-intake-local"
main = "src/index.js"
compatibility_date = "2026-07-16"

[vars]
ENVIRONMENT = "test"
ALLOWED_ORIGINS = "http://127.0.0.1:8765"
POW_DIFFICULTY = "8"
MAX_SUBMISSIONS_PER_HOUR = "20"
RATE_SALT = "local-test-rate-salt-not-for-production"
MAC_PULL_TOKEN = "local-test-pull-token-not-for-production"

[[d1_databases]]
binding = "DB"
database_name = "kfc-research-intake"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"
